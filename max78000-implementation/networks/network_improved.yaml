---
# MAX78000 synthesis config for the CMSIS-NN improved variant (3x3 + BN).
# Identical topology to network_baseline.yaml — BN is folded into the
# preceding conv at synthesis time so it doesn't appear here.

arch: ai85net_cmsis_improved
dataset: CIFAR10

layers:
  # L1: conv 3x3 + BN + ReLU,  3 -> 32        32x32x3 → 32x32x32
  - pad: 1
    activate: ReLU
    out_offset: 0x2000
    processors: 0x0000.0000.0000.0007
    data_format: HWC
    op: conv2d

  # L2: maxpool 2 + conv 3x3 + BN + ReLU, 32 -> 32        → 16x16x32
  - pad: 1
    max_pool: 2
    pool_stride: 2
    activate: ReLU
    out_offset: 0
    processors: 0xffff.ffff.0000.0000
    op: conv2d

  # L3: maxpool 2 + conv 3x3 + BN + ReLU, 32 -> 64        → 8x8x64
  - pad: 1
    max_pool: 2
    pool_stride: 2
    activate: ReLU
    out_offset: 0x2000
    processors: 0x0000.0000.ffff.ffff
    op: conv2d

  # L4: maxpool 2 passthrough                              → 4x4x64
  - max_pool: 2
    pool_stride: 2
    out_offset: 0
    processors: 0xffff.ffff.ffff.ffff
    op: passthrough

  # L5: MLP 1024 -> 10
  - op: mlp
    out_offset: 0x2000
    output_width: 32
    flatten: true
    processors: 0xffff.ffff.ffff.ffff
